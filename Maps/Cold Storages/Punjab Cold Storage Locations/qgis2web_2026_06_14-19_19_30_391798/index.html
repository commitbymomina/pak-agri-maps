        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[28.933932730581247,69.73024310054488],[33.2482689368952,77.47781868230585]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_OpenStreetMap_0');
        map.getPane('pane_OpenStreetMap_0').style.zIndex = 400;
        var layer_OpenStreetMap_0 = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            pane: 'pane_OpenStreetMap_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 19
        });
        layer_OpenStreetMap_0;
        map.addLayer(layer_OpenStreetMap_0);
        function pop_pak_admin2_em_1(feature, layer) {
            var popupContent = '<table>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_pak_admin2_em_1_0() {
            return {
                pane: 'pane_pak_admin2_em_1',
                opacity: 1,
                color: 'rgba(84,74,74,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1, 
                fillOpacity: 0,
                interactive: true,
            }
        }
        map.createPane('pane_pak_admin2_em_1');
        map.getPane('pane_pak_admin2_em_1').style.zIndex = 401;
        map.getPane('pane_pak_admin2_em_1').style['mix-blend-mode'] = 'normal';
        var layer_pak_admin2_em_1 = new L.geoJson(json_pak_admin2_em_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_pak_admin2_em_1',
            layerName: 'layer_pak_admin2_em_1',
            pane: 'pane_pak_admin2_em_1',
            onEachFeature: pop_pak_admin2_em_1,
            style: style_pak_admin2_em_1_0,
        });
        bounds_group.addLayer(layer_pak_admin2_em_1);
        map.addLayer(layer_pak_admin2_em_1);
        function pop_All_Cold_Storage_Coordinates_colored_2(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['District'] !== null ? autolinker.link(String(feature.properties['District']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['Cold Storage Name'] !== null ? autolinker.link(String(feature.properties['Cold Storage Name']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_All_Cold_Storage_Coordinates_colored_2_0(feature) {
            switch(String(feature.properties['Color'])) {
                case 'Blue':
                    return {
                pane: 'pane_All_Cold_Storage_Coordinates_colored_2',
                radius: 2.0,
                stroke: false,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(43,131,186,1.0)',
                interactive: true,
            }
                    break;
                case 'Orange':
                    return {
                pane: 'pane_All_Cold_Storage_Coordinates_colored_2',
                radius: 2.0,
                stroke: false,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(255,127,0,1.0)',
                interactive: true,
            }
                    break;
                case 'Yellow':
                    return {
                pane: 'pane_All_Cold_Storage_Coordinates_colored_2',
                radius: 2.0,
                stroke: false,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(238,224,27,1.0)',
                interactive: true,
            }
                    break;
                default:
                    return {
                pane: 'pane_All_Cold_Storage_Coordinates_colored_2',
                radius: 4.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(205,102,121,1.0)',
                interactive: true,
            }
                    break;
            }
        }
        map.createPane('pane_All_Cold_Storage_Coordinates_colored_2');
        map.getPane('pane_All_Cold_Storage_Coordinates_colored_2').style.zIndex = 402;
        map.getPane('pane_All_Cold_Storage_Coordinates_colored_2').style['mix-blend-mode'] = 'normal';
        var layer_All_Cold_Storage_Coordinates_colored_2 = new L.geoJson(json_All_Cold_Storage_Coordinates_colored_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_All_Cold_Storage_Coordinates_colored_2',
            layerName: 'layer_All_Cold_Storage_Coordinates_colored_2',
            pane: 'pane_All_Cold_Storage_Coordinates_colored_2',
            onEachFeature: pop_All_Cold_Storage_Coordinates_colored_2,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_All_Cold_Storage_Coordinates_colored_2_0(feature));
            },
        });
        bounds_group.addLayer(layer_All_Cold_Storage_Coordinates_colored_2);
        map.addLayer(layer_All_Cold_Storage_Coordinates_colored_2);
        setBounds();
        var i = 0;
        layer_pak_admin2_em_1.eachLayer(function(layer) {
            var context = {
                feature: layer.feature,
                variables: {}
            };
            layer.bindTooltip((layer.feature.properties['adm2_name'] !== null?String('<div style="color: #323232; font-size: 7pt; font-family: \'Open Sans\', sans-serif;">' + layer.feature.properties['adm2_name']) + '</div>':''), {permanent: true, offset: [-0, -16], className: 'css_pak_admin2_em_1'});
            labels.push(layer);
            totalMarkers += 1;
              layer.added = true;
              addLabel(layer, i);
              i++;
        });
        resetLabels([layer_pak_admin2_em_1]);
        map.on("zoomend", function(){
            resetLabels([layer_pak_admin2_em_1]);
        });
        map.on("layeradd", function(){
            resetLabels([layer_pak_admin2_em_1]);
        });
        map.on("layerremove", function(){
            resetLabels([layer_pak_admin2_em_1]);
        });
        // Add cold storage legend
        var legend = L.control({ position: 'bottomright' });
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'info legend');
            div.innerHTML = `
                <div style="
                    background: white;
                    padding: 10px 14px;
                    border-radius: 8px;
                    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
                    font-family: 'Open Sans', sans-serif;
                    font-size: 12px;
                    color: #333;
                    line-height: 1.8;
                ">
                    <div style="font-weight: 600; margin-bottom: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #555;">Cold Storage</div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span style="display:inline-block; width:12px; height:12px; border-radius:50%; background:#EEE01B; flex-shrink:0;"></span>
                        <span>Potato</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span style="display:inline-block; width:12px; height:12px; border-radius:50%; background:#FF7F00; flex-shrink:0;"></span>
                        <span>Kinnow</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span style="display:inline-block; width:12px; height:12px; border-radius:50%; background:#2B83BA; flex-shrink:0;"></span>
                        <span>General</span>
                    </div>
                </div>
            `;
            return div;
        };
        legend.addTo(map);
        </script>        
    </body>
